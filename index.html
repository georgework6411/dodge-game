<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodge Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            text-align: center;
        }

        .ui-panel {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            width: 400px;
        }

        canvas {
            background-color: #2b2b2b;
            border: 4px solid #444;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: block;
        }

        #screen-overlay {
            position: absolute;
            top: 44px; /* Accounts for UI panel height */
            left: 0;
            width: 400px;
            height: 500px;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        p {
            margin-bottom: 20px;
            color: #ccc;
            font-size: 14px;
        }

        button {
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            background: #00ffcc;
            color: #1a1a1a;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
        }

        button:hover {
            background: #00e6b8;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .controls-hint {
            margin-top: 25px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-panel">
            <div id="score-display">Score: 0</div>
            <div id="high-score-display">High Score: 0</div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="500"></canvas>

        <div id="screen-overlay">
            <h1 id="overlay-title">DODGE</h1>
            <p id="overlay-desc">Use Left/Right Arrows or A/D to move</p>
            <button id="start-btn">PLAY</button>
            <div class="controls-hint">Tip: The longer you survive, the faster they fall!</div>
        </div>
    </div>
